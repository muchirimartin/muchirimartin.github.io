  <style>
    :root {
      --bg:#111009;--surface:#1A1814;--surface2:#221F19;
      --text:#F0EAE0;--muted:#9A9080;--faint:#5C5548;
      --amber:#D4923A;--amber-d:#8A5A1A;--amber-g:#F0B060;
      --green:#4A7C5F;--green-d:#2A4A38;
      --border:#2E2A24;--border2:#3A362E;
      --serif:'Fraunces',Georgia,serif;
      --body:'Source Serif 4',Georgia,serif;
      --mono:'Space Mono',monospace;
      --max:660px;--pad:clamp(1.25rem,5vw,2.5rem);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.75;-webkit-font-smoothing:antialiased;min-height:100vh;}
    ::selection{background:var(--amber-d);color:var(--text);}
    a{color:var(--amber);text-decoration:none;border-bottom:1px solid var(--amber-d);transition:color .2s,border-color .2s;}
    a:hover{color:var(--amber-g);border-color:var(--amber);}
    .wrap{max-width:var(--max);margin:0 auto;padding:0 var(--pad);}

    nav{position:sticky;top:0;z-index:100;background:rgba(17,16,9,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:1rem var(--pad);}
    .nav-inner{max-width:var(--max);margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
    .nav-home{font-family:var(--mono);font-size:.62rem;letter-spacing:.06em;color:var(--faint);border:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;}
    .nav-home:hover{color:var(--muted);border:none;}
    .nav-home::before{content:'←';font-size:.7rem;}
    .nav-name{font-family:var(--serif);font-weight:300;font-size:.9rem;color:var(--text);border:none;letter-spacing:.01em;}
    .nav-name:hover{color:var(--amber);border:none;}
    .nav-links{display:flex;gap:1.5rem;list-style:none;}
    .nav-links a{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border:none;transition:color .2s;}
    .nav-links a:hover{color:var(--amber);}
    .nav-links a.current{color:var(--amber);}

    .page-header{padding:3.5rem 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:3rem;}
    .page-eyebrow{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:.75rem;}
    h1{font-family:var(--serif);font-weight:300;font-style:italic;font-size:clamp(2rem,5vw,2.75rem);line-height:1.15;letter-spacing:-.01em;color:var(--text);}

    .label{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem;}
    .label::after{content:'';flex:1;height:1px;background:var(--border);}

    .section{padding:2.5rem 0;}
    .section+.section{border-top:1px solid var(--border);}

    /* Research items */
    .r-item{padding:1.75rem 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:2.5rem 1fr;gap:1rem;}
    .r-item:first-child{border-top:1px solid var(--border);}
    .r-num{font-family:var(--mono);font-size:.6rem;color:var(--amber-d);padding-top:.25rem;}
    .r-item h3{font-family:var(--serif);font-weight:400;font-size:1.05rem;color:var(--text);margin-bottom:.5rem;line-height:1.35;}
    .r-item p{font-size:.88rem;color:var(--muted);line-height:1.7;max-width:520px;}
    .r-status{display:inline-block;margin-top:.75rem;font-family:var(--mono);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--green);background:var(--green-d);padding:.18rem .6rem;border-radius:2px;}

    /* Papers / outputs */
    .paper-item{padding:1.25rem 0;border-bottom:1px solid var(--border);}
    .paper-item:first-child{border-top:1px solid var(--border);}
    .paper-venue{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:.35rem;}
    .paper-title{font-family:var(--serif);font-weight:400;font-size:.95rem;color:var(--text);line-height:1.4;margin-bottom:.3rem;}
    .paper-authors{font-size:.78rem;color:var(--muted);}

    .tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:2rem;}
    .tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.04em;color:var(--green);background:var(--green-d);padding:.2rem .6rem;border-radius:2px;}

    footer{border-top:1px solid var(--border);padding:1.75rem var(--pad);max-width:var(--max);margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;}
    footer p{font-family:var(--mono);font-size:.6rem;color:var(--faint);letter-spacing:.04em;}
  </style>
</head>

        <div class="r-item">
          <span class="r-num">01</span>
          <div>
            <h3>AI educational assessment tools and Kenyan multilingual writing</h3>
            <p>Auditing how automated essay graders and AI text-detection tools perform on Kenyan English, Swahili-English code-switching, and Sheng. The central question: do these tools penalise features of Kenyan student writing that are not errors — they are simply different from the tool's calibration standard? Documenting the equity consequences of deploying tools that were never designed to serve the students they are now assessing.</p>
            <span class="r-status">In progress</span>
          </div>
        </div>

        <div class="r-item">
          <span class="r-num">02</span>
          <div>
            <h3>Building NLP resources for Kenyan languages</h3>
            <p>Developing annotated datasets, annotation schemas, and benchmarks for Kenyan English, code-switched Swahili-English, and Sheng. This is the linguistic infrastructure that any future AI tool for Kenyan students will need — and that currently does not exist. Working with Kenyan English language teachers to define what counts as a Kenyan English feature versus a writing error.</p>
            <span class="r-status">In progress</span>
          </div>
        </div>

        <div class="r-item">
          <span class="r-num">03</span>
          <div>
            <h3>AI governance and accountability in African education</h3>
            <p>Examining the gap between Kenya's Data Protection Act (2019) and actual EdTech practice. Who regulates AI tools in Kenyan schools? What accountability mechanisms exist? What minimum procurement standards should require before an AI system can be deployed on students? This work engages the Office of the Data Protection Commissioner and the Kenya ICT Authority.</p>
            <span class="r-status">Early stage</span>
          </div>
        </div>

        <div class="r-item">
          <span class="r-num">04</span>
          <div>
            <h3>The CBC-AI double foreclosure</h3>
            <p>Investigating how Kenya's Competency-Based Curriculum and AI adoption interact in secondary education. Drawing on Wandia Njoya's critique of the CBC as a system that de-emphasises knowledge in favour of skill, this research asks whether the combination of CBC and AI tools forecloses the conditions under which critical thinking develops — and what the empirical evidence looks like in the first CBC cohorts.</p>
            <span class="r-status">Early stage</span>
          </div>
        </div>
      </div>
